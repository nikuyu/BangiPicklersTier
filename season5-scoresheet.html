<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bangi Picklers · Season 5 Ladder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;background:#f1f5f9;}
.league-bar{display:flex;background:#1e1b4b;}
.league-btn{flex:1;padding:13px 8px;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;background:transparent;color:#555;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:7px;}
.league-btn img{height:20px;object-fit:contain;}
.league-btn.men-active{background:rgba(200,200,0,0.12);color:#c8c800;border-bottom:3px solid #c8c800;}
.league-btn.women-active{background:rgba(147,102,200,0.15);color:#c084fc;border-bottom:3px solid #c084fc;}
.header{padding:16px 16px 0;}
.header-inner{max-width:760px;margin:0 auto;}
.header-logos{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sponsor-text{font-size:14px;font-weight:800;color:#ff6b35;letter-spacing:1px;}
.sponsor-logo{height:34px;object-fit:contain;}
.bp-logo{height:50px;object-fit:contain;}
.header-title{font-size:21px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
.header-sub{font-size:11px;color:rgba(255,255,255,0.65);margin-top:3px;}
.btn-export{border:none;border-radius:8px;padding:8px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:#f59e0b;color:#fff;}
.nav-tabs{display:flex;gap:2px;margin-top:12px;overflow-x:auto;}
.nav-tab{padding:9px 14px;border:none;background:transparent;font-weight:700;font-size:11px;border-radius:8px 8px 0 0;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;color:rgba(255,255,255,0.55);transition:all 0.15s;}
.nav-tab.active{background:#fff;}
.results-pill{margin-left:auto;align-self:center;padding-bottom:6px;}
.results-pill span{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.main{max-width:760px;margin:0 auto;padding:16px;}
.page{display:none;}.page.active{display:block;}
/* Attend */
.attend-toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.attend-count{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;}
.week-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.week-btn{padding:7px 15px;border-radius:20px;border:2px solid #e5e7eb;background:#fff;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.search-box{width:100%;padding:9px 12px;border-radius:8px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;border:1px solid #d1d5db;}
.action-btns{display:flex;gap:7px;margin-bottom:12px;}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;}
.ptile{border-radius:10px;border:2px solid #e5e7eb;padding:9px 8px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px;background:#fff;}
.ptile.sel-men{border-color:#ff6b35;background:#fff5f0;}
.ptile.sel-women{border-color:#9333ea;background:#faf5ff;}
.pavatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#e5e7eb;flex-shrink:0;}
.pname{font-size:11px;font-weight:600;color:#111;line-height:1.3;}
.ptier{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-top:2px;display:inline-block;}
.tier-S{background:#fef3c7;color:#92400e;}
.tier-A{background:#dbeafe;color:#1e40af;}
.tier-B{background:#d1fae5;color:#065f46;}
.tier-C{background:#f3f4f6;color:#374151;}
.btn-confirm{width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:14px;color:#fff;}
/* Scoresheet */
.no-attend{text-align:center;padding:40px 20px;color:#9ca3af;font-size:13px;}
.court-pills{display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap;}
.cpill{padding:7px 16px;border-radius:20px;border:2px solid #e5e7eb;background:#fff;color:#374151;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.pcnt{border-radius:10px;padding:1px 6px;font-size:10px;}
.court-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.chdr{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;}
.chdr-left{display:flex;align-items:center;gap:9px;}
.cnum{background:#f59e0b;color:#fff;font-weight:700;font-size:17px;width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cname{color:#fff;font-weight:600;font-size:15px;}
.sbadge{background:rgba(255,255,255,0.2);color:#fff;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;}
.rbadge{background:rgba(255,255,255,0.15);color:#e2e8f0;padding:3px 9px;border-radius:20px;font-size:11px;}
.rcolhdr{display:grid;grid-template-columns:54px 1fr 1fr 1fr 1fr;gap:5px;padding:8px 13px 5px;background:#f9fafb;border-bottom:1px solid #e5e7eb;}
.rcolhdr div{font-size:10px;font-weight:700;text-align:center;}
.rbody{padding:6px 13px 14px;}
.rrow{display:grid;grid-template-columns:54px 1fr 1fr 1fr 1fr;gap:5px;align-items:center;padding:4px 2px;border-bottom:1px solid #f3f4f6;margin-bottom:1px;border-radius:4px;}
.rrow.hd{background:rgba(239,246,255,0.6);}
.rrow:last-child{border-bottom:none;}
.rlabel{font-size:10px;font-weight:600;color:#9ca3af;padding-left:2px;}
.rlabel.act{color:#1e40af;}
select{width:100%;padding:5px 3px;font-size:12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#9ca3af;cursor:pointer;outline:none;font-family:inherit;}
select.filled{background:#eff6ff;color:#1e40af;}
.c1g{background:linear-gradient(135deg,#7c3aed,#5b21b6);}
.c3g{background:linear-gradient(135deg,#1d4ed8,#1e3a8a);}
.c5g{background:linear-gradient(135deg,#0369a1,#075985);}
.c7g{background:linear-gradient(135deg,#0f766e,#115e59);}
/* Standings */
.stand-toggle{display:flex;gap:6px;margin-bottom:13px;}
.stab{padding:8px 18px;border-radius:20px;border:2px solid #e5e7eb;background:#fff;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.scard{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.shdr{padding:13px 18px;color:#fff;font-weight:700;font-size:15px;}
.sbody{padding:14px;}
.slegend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.schip{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:4px 9px;font-size:10px;color:#0369a1;font-weight:600;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#1e1b4b;color:#fff;}
th{padding:9px 10px;text-align:left;font-size:11px;}
th.c,td.c{text-align:center;}
td{padding:8px 10px;border-top:1px solid #f3f4f6;}
tbody tr:nth-child(odd){background:#f9fafb;}
tbody tr:nth-child(even){background:#fff;}
.pbadge{background:#1e1b4b;color:#fff;border-radius:12px;padding:2px 9px;font-weight:700;font-size:12px;}
.wn{color:#16a34a;font-weight:700;}.ln{color:#dc2626;font-weight:700;}.gn{color:#6b7280;}
.empty-s{text-align:center;color:#9ca3af;padding:36px 0;font-size:13px;}
/* Players page */
.add-form{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:17px;margin-bottom:14px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.flabel{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
input[type=text]{padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;font-family:inherit;outline:none;}
.btn{border:none;border-radius:8px;padding:8px 16px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.2s;}
.btn-men-c{background:#1a1a1a;color:#fff;}
.btn-women-c{background:#9333ea;color:#fff;}
.btn-sm{padding:5px 11px;font-size:11px;}
.btn-red{background:#ef4444;color:#fff;}
.btn-gray{background:#e5e7eb;color:#374151;}
.av-prev{width:46px;height:46px;border-radius:50%;object-fit:cover;background:#e5e7eb;border:2px solid #e5e7eb;}
/* Theme */
.tm-men .nav-tab.active{color:#1a1a1a;}
.tm-men .results-pill span{background:rgba(200,200,0,0.15);color:#8a8a00;}
.tm-men .week-btn.active,.tm-men .cpill.active{border-color:#1a1a1a;background:#1a1a1a;color:#fff;}
.tm-men .stab.active{border-color:#1a1a1a;background:#1a1a1a;color:#fff;}
.tm-women .nav-tab.active{color:#7e22ce;}
.tm-women .results-pill span{background:rgba(192,132,252,0.2);color:#9333ea;}
.tm-women .week-btn.active,.tm-women .cpill.active{border-color:#7e22ce;background:#7e22ce;color:#fff;}
.tm-women .stab.active{border-color:#7e22ce;background:#7e22ce;color:#fff;}
.hdr-men{background:linear-gradient(135deg,#111,#2d2d2d);}
.hdr-women{background:linear-gradient(135deg,#581c87,#9333ea);}
@media(max-width:480px){
  .player-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
  .form-grid{grid-template-columns:1fr;}
  .rcolhdr,.rrow{grid-template-columns:42px 1fr 1fr 1fr 1fr;}
}
</style>
</head>

const MASTER=JSON.parse(document.getElementById('masterdata').textContent);
const COURTS=[1,3,5,7];
const COURT_BONUS={1:4,3:3,5:2,7:1};
const WIN_PTS=10;
const MAX_ROUNDS=16;
const WEEKS=[1,2,3,4];
const CGRD={1:'c1g',3:'c3g',5:'c5g',7:'c7g'};

let league='men',tab='attend',activeWeek=1,activeCourt=1,standTab='weekly',searchQ='';

const state={
  men:{attendance:{1:[],2:[],3:[],4:[]},rounds:{1:mkWR(),2:mkWR(),3:mkWR(),4:mkWR()},players:null},
  women:{attendance:{1:[],2:[],3:[],4:[]},rounds:{1:mkWR(),2:mkWR(),3:mkWR(),4:mkWR()},players:null}
};
function mkWR(){const r={};COURTS.forEach(c=>{r[c]=Array.from({length:MAX_ROUNDS},()=>({w1:'',w2:'',l1:'',l2:''}));});return r;}
function getPlayers(){if(!state[league].players)state[league].players=JSON.parse(JSON.stringify(MASTER[league]));return state[league].players;}
function getAttend(){return state[league].attendance[activeWeek];}
function getRounds(){return state[league].rounds[activeWeek];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function avUrl(id){return id?'https://assets.reclub.co/user-avatars/'+id+'.webp':'';}
function accent(){return league==='men'?'#1a1a1a':'#9333ea';}
function hdrCls(){return league==='men'?'hdr-men':'hdr-women';}
function tmCls(){return league==='men'?'tm-men':'tm-women';}
function btnCls(){return league==='men'?'btn-men-c':'btn-women-c';}

function saveState(){try{const s={men:{attendance:state.men.attendance,rounds:state.men.rounds,players:state.men.players},women:{attendance:state.women.attendance,rounds:state.women.rounds,players:state.women.players}};localStorage.setItem('bp_s5',JSON.stringify(s));}catch(e){}}
function loadState(){try{const raw=localStorage.getItem('bp_s5');if(!raw)return;const s=JSON.parse(raw);['men','women'].forEach(lg=>{if(s[lg]){if(s[lg].attendance)state[lg].attendance=s[lg].attendance;if(s[lg].rounds)state[lg].rounds=s[lg].rounds;if(s[lg].players)state[lg].players=s[lg].players;}});}catch(e){}}

function totalFilled(){return COURTS.reduce((s,c)=>s+getRounds()[c].filter(r=>r.w1||r.w2).length,0);}

function render(){document.getElementById('app').innerHTML=buildApp();}

function buildApp(){
  const tf=totalFilled();
  const navs=[{id:'attend',lbl:'👥 Hadir'},{id:'score',lbl:'📝 Scoresheet'},{id:'standings',lbl:'🏆 Standings'},{id:'players',lbl:'⚙️ Players'}];
  return '<div class="'+tmCls()+'">'
    +'<div class="league-bar">'
    +'<button class="league-btn '+(league==='men'?'men-active':'')+'" onclick="switchLeague(&apos;men&apos;)">'
    +'<img src="'+BP_LOGO+'" alt="">Men&#39;s</button>'
    +'<button class="league-btn '+(league==='women'?'women-active':'')+'" onclick="switchLeague(&apos;women&apos;)">'
    +'<img src="'+BP_LOGO+'" alt="">Women&#39;s</button>'
    +'</div>'
    +'<div class="header '+hdrCls()+'">'
    +'<div class="header-inner">'
    +'<div class="header-logos">'
    +(league==='men'?'<img src="'+POCIATO_LOGO+'" class="sponsor-logo" alt="Pociato" style="filter:invert(0);height:38px;">':'<img src="'+SWJ_LOGO+'" class="sponsor-logo" alt="Seri Wajah">')
    +'<img src="'+BP_LOGO+'" class="bp-logo" alt="Bangi Picklers">'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-end;">'
    +'<div><div class="header-title">'+(league==='men'?'🏓 Men's Ladder':'🏸 Women's Ladder')+'</div>'
    +'<div class="header-sub">'+(league==='men'?'Pociato Pizza':'Seri Wajah')+' × Bangi Picklers · Season 5</div></div>'
    +'<button class="btn-export" id="btnExport" onclick="exportCSV()">📋 Export</button>'
    +'</div>'
    +'<div class="nav-tabs">'
    +navs.map(n=>'<button class="nav-tab '+(tab===n.id?'active':'')+'" onclick="switchTab(''+n.id+'')">'+n.lbl+'</button>').join('')
    +'<div class="results-pill"><span>'+tf+' results</span></div>'
    +'</div></div></div>'
    +'<div class="main">'
    +'<div id="pg-attend" class="page '+(tab==='attend'?'active':'')+'">'+buildAttend()+'</div>'
    +'<div id="pg-score" class="page '+(tab==='score'?'active':'')+'">'+buildScore()+'</div>'
    +'<div id="pg-standings" class="page '+(tab==='standings'?'active':'')+'">'+buildStandings()+'</div>'
    +'<div id="pg-players" class="page '+(tab==='players'?'active':'')+'">'+buildPlayers()+'</div>'
    +'</div></div>';
}

function buildAttend(){
  const players=getPlayers(),attend=getAttend();
  const filt=players.filter(p=>p.name.toLowerCase().includes(searchQ.toLowerCase())||(p.handle||'').toLowerCase().includes(searchQ.toLowerCase()));
  const tiles=filt.map(p=>{
    const sel=attend.includes(p.handle);
    return '<div class="ptile '+(sel?(league==='men'?'sel-men':'sel-women'):'')+'" onclick="toggleAttend(''+esc(p.handle)+'')">'
      +'<img class="pavatar" src="'+avUrl(p.avatarId)+'" onerror="this.style.opacity=0" alt="">'
      +'<div><div class="pname">'+esc(p.name)+'</div>'
      +'<span class="ptier tier-'+p.tier+'">'+p.tier+'</span></div></div>';
  }).join('');
  return '<div class="attend-toprow">'
    +'<div style="font-size:14px;font-weight:700;">Week '+activeWeek+' — Siapa Hadir?</div>'
    +'<div class="attend-count" style="background:'+(league==='men'?'#fff5f0':'#faf5ff')+';color:'+accent()+';border:1px solid '+accent()+'30;">'+attend.length+' / '+players.length+'</div>'
    +'</div>'
    +'<div class="week-btns">'+WEEKS.map(w=>'<button class="week-btn '+(activeWeek===w?'active':'')+'" onclick="setWeek('+w+')">Week '+w+'</button>').join('')+'</div>'
    +'<input type="text" class="search-box" placeholder="🔍 Cari nama player..." value="'+esc(searchQ)+'" oninput="searchQ=this.value;rp('attend')">'
    +'<div class="action-btns">'
    +'<button class="btn '+btnCls()+' btn-sm" onclick="selAll()">Select All</button>'
    +'<button class="btn btn-gray btn-sm" onclick="clearAttend()">Clear</button>'
    +'</div>'
    +'<div class="player-grid">'+tiles+'</div>'
    +'<button class="btn-confirm" style="background:'+accent()+'" onclick="switchTab('score')">✅ Confirm '+attend.length+' Players → Scoresheet</button>';
}

function buildScore(){
  const attend=getAttend();
  if(!attend.length)return '<div class="no-attend">⚠️ Belum set attendance untuk Week '+activeWeek+'.<br><br><button class="btn '+btnCls()+'" onclick="switchTab('attend')">→ Set Attendance</button></div>';
  const rounds=getRounds();
  const pills=COURTS.map(c=>{
    const filled=rounds[c].filter(r=>r.w1||r.w2).length;
    const isA=c===activeCourt;
    return '<button class="cpill '+(isA?'active':'')+'" onclick="setActiveCourt('+c+')">'
      +'Court '+c+(filled>0?'<span class="pcnt" style="background:'+(isA?'rgba(255,255,255,0.3)':'#ede9fe')+';color:'+(isA?'#fff':'#5b21b6')+'">'+filled+'</span>':'')
      +'</button>';
  }).join('');
  return '<div class="week-btns">'+WEEKS.map(w=>'<button class="week-btn '+(activeWeek===w?'active':'')+'" onclick="setWeek('+w+')">Week '+w+'</button>').join('')+'</div>'
    +'<div class="court-pills">'+pills+'</div>'
    +buildCourtCard();
}

function buildCourtCard(){
  const c=activeCourt,rounds=getRounds()[c];
  const filled=rounds.filter(r=>r.w1||r.w2||r.l1||r.l2).length;
  const W=WIN_PTS+COURT_BONUS[c],L=COURT_BONUS[c];
  const attend=getAttend(),players=getPlayers();
  const present=players.filter(p=>attend.includes(p.handle));
  let rows='';
  for(let i=0;i<MAX_ROUNDS;i++){
    const r=rounds[i],hd=r.w1||r.w2||r.l1||r.l2;
    rows+='<div class="rrow '+(hd?'hd':'')+'"><div class="rlabel '+(hd?'act':'')+'">R'+(i+1)+'</div>'
      +mkSel(c,i,'w1',r.w1,[r.w2,r.l1,r.l2],present)
      +mkSel(c,i,'w2',r.w2,[r.w1,r.l1,r.l2],present)
      +mkSel(c,i,'l1',r.l1,[r.w1,r.w2,r.l2],present)
      +mkSel(c,i,'l2',r.l2,[r.w1,r.w2,r.l1],present)
      +'</div>';
  }
  return '<div class="court-card"><div class="chdr '+CGRD[c]+'">'
    +'<div class="chdr-left"><div class="cnum">'+c+'</div><div class="cname">COURT '+c+'</div>'
    +'<div class="sbadge">W='+W+' L='+L+'</div></div>'
    +'<div class="rbadge">'+filled+'/'+MAX_ROUNDS+' rounds</div>'
    +'</div>'
    +'<div class="rcolhdr"><div></div><div style="color:#16a34a">MENANG 1</div><div style="color:#16a34a">MENANG 2</div><div style="color:#dc2626">KALAH 1</div><div style="color:#dc2626">KALAH 2</div></div>'
    +'<div class="rbody">'+rows+'</div></div>';
}

function mkSel(court,ri,field,val,excl,players){
  const opts=players.filter(p=>!excl.includes(p.handle)||p.handle===val)
    .map(p=>'<option value="'+esc(p.handle)+'"'+(p.handle===val?' selected':'')+'>'+esc(p.name)+'</option>').join('');
  return '<select class="'+(val?'filled':'')+'" onchange="setField('+court+','+ri+',''+field+'',this.value)"><option value="">—</option>'+opts+'</select>';
}

function buildStandings(){
  const hbg=league==='men'?'linear-gradient(135deg,#111,#2d2d2d)':'linear-gradient(135deg,#581c87,#9333ea)';
  const weekBtns='<div class="week-btns" style="margin-bottom:0;">'+WEEKS.map(w=>'<button class="week-btn '+(activeWeek===w?'active':'')+'" onclick="setWeek('+w+')">Week '+w+'</button>').join('')+'</div>';
  return '<div class="stand-toggle">'
    +'<button class="stab '+(standTab==='weekly'?'active':'')+'" onclick="standTab='weekly';rp('standings')">📅 Weekly</button>'
    +'<button class="stab '+(standTab==='cumulative'?'active':'')+'" onclick="standTab='cumulative';rp('standings')">📊 Cumulative</button>'
    +'</div>'
    +(standTab==='weekly'?weekBtns:'')
    +'<div class="scard" style="margin-top:10px;">'
    +'<div class="shdr" style="background:'+hbg+'">'+(standTab==='weekly'?'📅 Week '+activeWeek+' Standings':'📊 Season 5 Cumulative')+'</div>'
    +'<div class="sbody">'+(standTab==='weekly'?buildWeeklyS():buildCumS())+'</div>'
    +'</div>';
}

function calcStats(weekNum){
  const rounds=state[league].rounds[weekNum];
  const players=getPlayers();
  const stats={};
  players.forEach(p=>{stats[p.handle]={name:p.name,wins:0,losses:0,games:0,points:0};});
  const gl={};
  COURTS.forEach(c=>{
    rounds[c].forEach((r,idx)=>{
      [{h:r.w1,res:'W'},{h:r.w2,res:'W'},{h:r.l1,res:'L'},{h:r.l2,res:'L'}].forEach(({h,res})=>{
        if(!h)return;if(!gl[h])gl[h]=[];gl[h].push({court:c,round:idx+1,res});
      });
    });
  });
  Object.keys(gl).forEach(h=>{gl[h].sort((a,b)=>a.round-b.round);gl[h]=gl[h].slice(0,8);});
  Object.entries(gl).forEach(([h,games])=>{
    if(!stats[h])stats[h]={name:h,wins:0,losses:0,games:0,points:0};
    games.forEach(g=>{const b=COURT_BONUS[g.court];if(g.res==='W'){stats[h].wins++;stats[h].games++;stats[h].points+=WIN_PTS+b;}else{stats[h].losses++;stats[h].games++;stats[h].points+=b;}});
  });
  return stats;
}

function buildWeeklyS(){
  const stats=calcStats(activeWeek);
  const active=Object.entries(stats).filter(([,s])=>s.games>0).sort((a,b)=>b[1].points-a[1].points);
  if(!active.length)return '<div class="empty-s">Belum ada result untuk Week '+activeWeek+'</div>';
  return buildSTable(active);
}

function buildCumS(){
  const combined={};
  WEEKS.forEach(w=>{
    const stats=calcStats(w);
    Object.entries(stats).forEach(([h,s])=>{
      if(!s.games)return;
      if(!combined[h])combined[h]={name:s.name,wins:0,losses:0,games:0,points:0};
      combined[h].wins+=s.wins;combined[h].losses+=s.losses;combined[h].games+=s.games;combined[h].points+=s.points;
    });
  });
  const active=Object.entries(combined).sort((a,b)=>b[1].points-a[1].points);
  if(!active.length)return '<div class="empty-s">Belum ada result lagi</div>';
  return buildSTable(active);
}

function buildSTable(rows){
  const leg=COURTS.map(c=>'<div class="schip">Court '+c+': W='+(WIN_PTS+COURT_BONUS[c])+' L='+COURT_BONUS[c]+'</div>').join('');
  const medals=['🥇','🥈','🥉'];
  const trs=rows.map(([h,s],i)=>'<tr><td>'+(medals[i]||i+1)+'</td><td style="font-weight:600;">'+esc(s.name)+'</td>'
    +'<td class="c"><span class="pbadge">'+s.points+'</span></td>'
    +'<td class="c wn">'+s.wins+'</td><td class="c ln">'+s.losses+'</td><td class="c gn">'+s.games+'</td></tr>').join('');
  return '<div class="slegend">'+leg+'</div><div class="tw"><table><thead><tr><th>#</th><th>Player</th><th class="c">Pts</th><th class="c">W</th><th class="c">L</th><th class="c">Games</th></tr></thead><tbody>'+trs+'</tbody></table></div>';
}

function buildPlayers(){
  const players=getPlayers();
  const rows=players.map((p,i)=>'<tr>'
    +'<td><img class="av-prev" style="width:28px;height:28px;" src="'+avUrl(p.avatarId)+'" onerror="this.style.opacity=0" alt=""></td>'
    +'<td style="font-weight:600;">'+esc(p.name)+'</td>'
    +'<td style="color:#6b7280;font-size:11px;">'+esc(p.handle)+'</td>'
    +'<td><span class="ptier tier-'+p.tier+'">'+p.tier+'</span></td>'
    +'<td><button class="btn btn-red btn-sm" onclick="removePlayer('+i+')">✕</button></td>'
    +'</tr>').join('');
  return '<div class="add-form">'
    +'<div style="font-size:13px;font-weight:700;margin-bottom:13px;">➕ Add Player</div>'
    +'<div class="form-grid">'
    +'<div class="fg"><label class="flabel">Name</label><input type="text" id="inp-name" placeholder="e.g. Aiman Basri"></div>'
    +'<div class="fg"><label class="flabel">Reclub Handle</label><input type="text" id="inp-handle" placeholder="e.g. @aiman-basri-719"></div>'
    +'</div>'
    +'<div class="form-grid">'
    +'<div class="fg"><label class="flabel">Avatar ID</label><input type="text" id="inp-avatar" placeholder="e.g. 1012170" oninput="prevAv(this.value)"></div>'
    +'<div class="fg"><label class="flabel">Tier</label><select id="inp-tier" style="padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;font-family:inherit;"><option>S</option><option>A</option><option selected>B</option><option>C</option></select></div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">'
    +'<img id="av-prev" class="av-prev" src="" alt=""><span style="font-size:11px;color:#9ca3af;">Avatar preview</span>'
    +'</div>'
    +'<button class="btn '+btnCls()+'" onclick="addPlayer()">Add Player</button>'
    +'</div>'
    +'<div style="font-size:12px;font-weight:700;color:#6b7280;margin-bottom:8px;">'+players.length+' players</div>'
    +'<div class="tw" style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;">'
    +'<table><thead><tr><th></th><th>Name</th><th>Handle</th><th>Tier</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// Actions
function switchLeague(lg){league=lg;searchQ='';render();}
function switchTab(t){tab=t;render();}
function rp(pg){
  const el=document.getElementById('pg-'+pg);
  if(!el)return;
  if(pg==='attend')el.innerHTML=buildAttend();
  else if(pg==='score')el.innerHTML=buildScore();
  else if(pg==='standings')el.innerHTML=buildStandings();
  else if(pg==='players')el.innerHTML=buildPlayers();
  const pill=document.querySelector('.results-pill span');
  if(pill)pill.textContent=totalFilled()+' results';
}
function setWeek(w){activeWeek=w;render();}
function setActiveCourt(c){activeCourt=c;rp('score');}
function toggleAttend(h){const a=getAttend();const i=a.indexOf(h);if(i>-1)a.splice(i,1);else a.push(h);saveState();rp('attend');}
function selAll(){const p=getPlayers();state[league].attendance[activeWeek]=p.map(x=>x.handle);saveState();rp('attend');}
function clearAttend(){state[league].attendance[activeWeek]=[];saveState();rp('attend');}
function setField(court,ri,field,val){getRounds()[court][ri][field]=val;saveState();rp('score');}
function addPlayer(){
  const name=document.getElementById('inp-name')?.value?.trim();
  const handle=document.getElementById('inp-handle')?.value?.trim();
  const avatarId=document.getElementById('inp-avatar')?.value?.trim();
  const tier=document.getElementById('inp-tier')?.value||'C';
  if(!name||!handle){alert('Name dan handle wajib!');return;}
  const p=getPlayers();if(p.find(x=>x.handle===handle)){alert('Handle dah ada!');return;}
  p.push({name,handle,avatarId,tier});p.sort((a,b)=>a.name.localeCompare(b.name));
  saveState();rp('players');
}
function removePlayer(i){if(!confirm('Remove player?'))return;getPlayers().splice(i,1);saveState();rp('players');}
function prevAv(id){const img=document.getElementById('av-prev');if(img&&id)img.src=avUrl(id);}
function exportCSV(){
  let csv='League,Week,Court,Round,Menang1,Menang2,Kalah1,Kalah2\n';
  const nameOf=h=>{const p=getPlayers().find(x=>x.handle===h);return p?p.name:h;};
  ['men','women'].forEach(lg=>{
    WEEKS.forEach(w=>{COURTS.forEach(c=>{
      state[lg].rounds[w][c].forEach((r,i)=>{
        if(r.w1||r.w2||r.l1||r.l2)csv+=lg+','+w+','+c+','+(i+1)+','+nameOf(r.w1)+','+nameOf(r.w2)+','+nameOf(r.l1)+','+nameOf(r.l2)+'\n';
      });
    });});
  });
  navigator.clipboard.writeText(csv).then(()=>{const b=document.getElementById('btnExport');if(b){b.textContent='✓ Copied!';setTimeout(()=>{b.textContent='📋 Export';},2000);}});
}
loadState();render();
</script>
